<script>

const firebaseConfig = {

const db = firebase.firestore();

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// API key is stored server-side in Vercel environment variables

const languages = [
  'Python','JavaScript','TypeScript','Java','C++','C#','C','Go',
  'Rust','Swift','Kotlin','PHP','Ruby','Scala','R','MATLAB',
  'Perl','Haskell','Lua','Dart','Elixir','F#','Clojure',
  'Objective-C','Visual Basic'
];

const PLANS = [
  { id:'monthly', label:'Monthly', price:'$15',  period:'/month', link:'https://wwww.langswitch.net', highlight:true,  perks:['Unlimited conversions','All 25 languages','Copy to clipboard','Priority support'] },
  { id:'yearly',  label:'Yearly',  price:'$120', period:'/year',  link:'https://wwwww.langswitch.net',  highlight:false, perks:['Everything in Monthly','Best value – save 33%','Dedicated support','API access (coming soon)'] },
];

// ── API CALL ─────────────────────────────────────────────────────────────────
async function callAnthropic(prompt) {
  const r = await fetch('/api/convert', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  if (!r.ok) {
    const d = await r.json().catch(() => ({}));
    throw new Error(d.error || `API returned ${r.status}`);
  }
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.text || '';
}

// ── TRIAL HELPERS ─────────────────────────────────────────────────────────────
function fmtMs(ms) {
  const d = Math.floor(ms / 86400000), h = Math.floor((ms % 86400000) / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return d > 0 ? `${d}d ${h}h left` : `${h}h ${m}m left`;
}

// Get or create user doc in Firestore, returns { trialStart, subscribed }
async function getUserData(uid) {
  const ref = db.collection('users').doc(uid);
  const snap = await ref.get();
  if (snap.exists) return snap.data();
  const data = { trialStart: Date.now(), subscribed: false };
  await ref.set(data);
  return data;
}

function getTrialMsFromStart(trialStart) {
  const left = 7 * 24 * 60 * 60 * 1000 - (Date.now() - trialStart);
  return left > 0 ? left : 0;
}

// ── ICONS ─────────────────────────────────────────────────────────────────────
const Icon = ({ d, size=16, color='currentColor', fill='none', style={} }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0, ...style }}>
    <path d={d}/>
  </svg>
);
const ZapIcon    = ({size,color,fill}) => <Icon size={size} color={color||'currentColor'} fill={fill||'none'} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>;
const ChevDown   = ({size,style})      => <Icon size={size} color="#999" d="M6 9l6 6 6-6" style={style}/>;
const ArrowRight = ({size})            => <Icon size={size} color="#bbb" d="M5 12h14M12 5l7 7-7 7"/>;
const Loader     = ({size,style})      => <Icon size={size} color="#999" d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" style={style}/>;
const CopyIcon   = ({size})            => <Icon size={size} color="#444" d="M8 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2M8 4a2 2 0 012-2h4a2 2 0 012 2M8 4h8"/>;
const CheckIcon  = ({size,color})      => <Icon size={size} color={color||'#22c55e'} d="M20 6L9 17l-5-5"/>;
const LockIcon   = ({size})            => <Icon size={size} color="#999" d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4"/>;
const SparkIcon  = ({size})            => <Icon size={size} color="#92400e" d="M5 3l1.5 4.5L10 9l-3.5 1.5L5 15l-1.5-4.5L0 9l3.5-1.5L5 3zM19 1l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/>;

// ── AUTH HELPERS ──────────────────────────────────────────────────────────────
async function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  return auth.signInWithPopup(provider);
}

async function signInWithApple() {
  const provider = new firebase.auth.OAuthProvider('apple.com');
  provider.addScope('email');
  provider.addScope('name');
  return auth.signInWithPopup(provider);
}

// ── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage() {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleGoogle = async () => {
    setLoading(true); setErr('');
    try { await signInWithGoogle(); }
    catch (e) { setErr(e.message); setLoading(false); }
  };
  const handleApple = async () => {
    setLoading(true); setErr('');
    try { await signInWithApple(); }
    catch (e) { setErr(e.message); setLoading(false); }
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#fafafa' }}>
      <div style={{ width:'100%', maxWidth:'400px', padding:'40px 32px', background:'#fff', border:'1px solid #e5e5e5', borderRadius:'16px', boxShadow:'0 2px 12px rgba(0,0,0,0.06)', textAlign:'center' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', marginBottom:'28px' }}>
          <div style={{ width:'32px', height:'32px', background:'#111', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <ZapIcon size={16} color="#fff" fill="#fff"/>
          </div>
          <span style={{ fontWeight:700, fontSize:'18px', letterSpacing:'-0.3px' }}>Lang Switch</span>
        </div>
        <h2 style={{ fontSize:'22px', fontWeight:700, letterSpacing:'-0.5px', margin:'0 0 6px' }}>Welcome back</h2>
        <p style={{ fontSize:'14px', color:'#666', margin:'0 0 28px' }}>Sign in to convert code across 25+ languages</p>

        <button onClick={handleGoogle} disabled={loading}
          style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'10px', width:'100%', padding:'11px 16px', borderRadius:'8px', border:'1px solid #e5e5e5', background:'#fff', fontSize:'14px', fontWeight:500, cursor: loading?'not-allowed':'pointer', color:'#222', marginBottom:'10px' }}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.003 24.003 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <button onClick={handleApple} disabled={loading}
          style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'10px', width:'100%', padding:'11px 16px', borderRadius:'8px', border:'none', background:'#111', fontSize:'14px', fontWeight:500, cursor: loading?'not-allowed':'pointer', color:'#fff' }}>
          <svg width="16" height="18" viewBox="0 0 17 20" fill="white"><path d="M13.545 10.239c-.022-2.234 1.823-3.306 1.907-3.358-.04-.073-1.498-2.164-3.823-2.164-1.628 0-2.929 1.005-3.709 1.005-.797 0-2.002-.98-3.301-.953C2.679 4.797.782 6.076.782 8.654c0 3.178 2.406 7.726 4.267 7.726.995-.022 1.734-.724 3.07-.724 1.322 0 2.002.724 3.07.702 1.32-.022 2.922-3.206 3.846-5.37-2.512-1.186-2.512-4.5.51-5.749zM11.138.895C11.855.02 12.336-.555 12.336-.555s-1.262.068-2.595 1.26C8.548 1.783 8.003 3.017 8.07 3.54c0 0 1.263-.14 3.068-2.645z"/></svg>
          Continue with Apple
        </button>

        {err && <p style={{ fontSize:'12px', color:'#dc2626', marginTop:'14px' }}>{err}</p>}

        <p style={{ fontSize:'11px', color:'#aaa', marginTop:'24px', lineHeight:1.5 }}>
          By signing in you agree to our Terms of Service and Privacy Policy.
        </p>
      </div>
    </div>
  );
}

// ── LOADING SCREEN ──────────────────────────────────────────────────────────
function LoadingScreen() {
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Loader size={24} style={{ animation:'spin 1s linear infinite' }}/>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = not logged in
  const [page, setPage] = useState('app');
  const [trialMs, setTrialMs] = useState(0);
  const [subscribed, setSubscribed] = useState(false);
  const [dataLoaded, setDataLoaded] = useState(false);

  // Listen to auth state
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u || null));
    return unsub;
  }, []);

  // Load user data from Firestore when logged in
  useEffect(() => {
    if (!user) { setDataLoaded(user === null); return; }
    let cancelled = false;
    getUserData(user.uid).then(data => {
      if (cancelled) return;
      setSubscribed(data.subscribed);
      setTrialMs(getTrialMsFromStart(data.trialStart));
      setDataLoaded(true);
    });
    return () => { cancelled = true; };
  }, [user]);

  // Handle payment success redirect
  useEffect(() => {
    if (!user) return;
    const p = new URLSearchParams(window.location.search);
    if (p.get('payment') === 'success') {
      db.collection('users').doc(user.uid).update({ subscribed: true });
      setSubscribed(true);
      window.history.replaceState({}, '', '/');
    }
  }, [user]);

  // Trial countdown timer
  useEffect(() => {
    if (!user || subscribed || trialMs <= 0) return;
    const t = setInterval(() => {
      getUserData(user.uid).then(data => setTrialMs(getTrialMsFromStart(data.trialStart)));
    }, 30000);
    return () => clearInterval(t);
  }, [user, subscribed, trialMs]);

  // Show loading while checking auth
  if (user === undefined || !dataLoaded) return <LoadingScreen />;

  // Not logged in → login page
  if (user === null) return <LoginPage />;

  const trialActive = trialMs > 0;
  const canUse = subscribed || trialActive;

  return (
    <div style={{ minHeight:'100vh' }}>
      <Nav page={page} setPage={setPage} trialMs={trialMs} subscribed={subscribed} canUse={canUse} user={user}/>
      {page === 'pricing'
        ? <PricingPage setPage={setPage} user={user}/>
        : canUse
          ? <AppPage trialMs={trialMs} subscribed={subscribed} setPage={setPage}/>
          : <LockedPage setPage={setPage}/>}
    </div>
  );
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function Nav({ page, setPage, trialMs, subscribed, canUse, user }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    const h = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  return (
    <nav style={{ background:'#fff', borderBottom:'1px solid #e5e5e5', padding:'0 32px', height:'56px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:10 }}>
      <div style={{ display:'flex', alignItems:'center', gap:'8px', cursor:'pointer' }} onClick={() => setPage('app')}>
        <div style={{ width:'28px', height:'28px', background:'#111', borderRadius:'6px', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <ZapIcon size={14} color="#fff" fill="#fff"/>
        </div>
        <span style={{ fontWeight:600, fontSize:'15px', letterSpacing:'-0.3px' }}>Lang Switch</span>
      </div>
      <div style={{ display:'flex', gap:'16px', alignItems:'center' }}>
        {canUse && !subscribed && (
          <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'999px', padding:'3px 10px', fontSize:'11px', color:'#92400e', fontWeight:500 }}>
            <SparkIcon size={10}/> Free trial · {fmtMs(trialMs)}
          </div>
        )}
        {subscribed && (
          <div style={{ display:'flex', alignItems:'center', gap:'6px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'999px', padding:'3px 10px', fontSize:'11px', color:'#166534', fontWeight:500 }}>
            <CheckIcon size={10} color="#166534"/> Pro
          </div>
        )}
        <span style={{ fontSize:'13px', color: page==='app'?'#111':'#666', fontWeight: page==='app'?600:400, cursor:'pointer' }} onClick={() => setPage('app')}>Home</span>
        <button onClick={() => setPage('pricing')} style={{ padding:'6px 14px', background:'#111', color:'#fff', borderRadius:'6px', fontSize:'13px', fontWeight:500, border:'none', cursor:'pointer' }}>
          {subscribed ? 'Manage plan' : 'Upgrade'}
        </button>

        {/* User avatar & dropdown */}
        <div ref={menuRef} style={{ position:'relative' }}>
          <div onClick={() => setMenuOpen(!menuOpen)} style={{ width:'30px', height:'30px', borderRadius:'50%', overflow:'hidden', cursor:'pointer', border:'2px solid #e5e5e5', display:'flex', alignItems:'center', justifyContent:'center', background:'#f5f5f5' }}>
            {user.photoURL
              ? <img src={user.photoURL} width="30" height="30" style={{ borderRadius:'50%' }} referrerPolicy="no-referrer"/>
              : <span style={{ fontSize:'13px', fontWeight:600, color:'#666' }}>{(user.displayName || user.email || '?')[0].toUpperCase()}</span>
            }
          </div>
          {menuOpen && (
            <div style={{ position:'absolute', right:0, top:'calc(100% + 6px)', width:'200px', background:'#fff', border:'1px solid #e5e5e5', borderRadius:'10px', boxShadow:'0 4px 16px rgba(0,0,0,0.1)', overflow:'hidden', zIndex:100 }}>
              <div style={{ padding:'12px 14px', borderBottom:'1px solid #f0f0f0' }}>
                <p style={{ margin:0, fontSize:'13px', fontWeight:600, color:'#111' }}>{user.displayName || 'User'}</p>
                <p style={{ margin:'2px 0 0', fontSize:'11px', color:'#999', overflow:'hidden', textOverflow:'ellipsis' }}>{user.email}</p>
              </div>
              <button onClick={() => { auth.signOut(); setMenuOpen(false); }}
                style={{ width:'100%', textAlign:'left', padding:'10px 14px', fontSize:'13px', color:'#dc2626', background:'transparent', border:'none', cursor:'pointer', fontWeight:500 }}>
                Sign out
              </button>
            </div>
          )}
        </div>
      </div>
    </nav>
  );
}

// ── LOCKED ────────────────────────────────────────────────────────────────────
function LockedPage({ setPage }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'calc(100vh - 56px)', padding:'40px 24px', textAlign:'center' }}>
      <div style={{ width:'56px', height:'56px', background:'#f5f5f5', borderRadius:'14px', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'20px' }}>
        <LockIcon size={24}/>
      </div>
      <h2 style={{ fontSize:'26px', fontWeight:700, letterSpacing:'-0.5px', margin:'0 0 10px' }}>Your free trial has ended</h2>
      <p style={{ fontSize:'15px', color:'#666', maxWidth:'380px', lineHeight:1.6, margin:'0 0 28px' }}>You've used your 7-day free trial. Upgrade to keep converting code across 25 languages.</p>
      <button onClick={() => setPage('pricing')} style={{ padding:'10px 28px', background:'#111', color:'#fff', borderRadius:'8px', fontSize:'14px', fontWeight:600, border:'none', cursor:'pointer' }}>View plans →</button>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function AppPage({ trialMs, subscribed, setPage }) {
  const [src, setSrc] = useState(`def fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)\n\nprint(fibonacci(10))`);
  const [out, setOut] = useState('');
  const [srcLang, setSrcLang] = useState('Python');
  const [tgtLang, setTgtLang] = useState('JavaScript');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [copied, setCopied] = useState(false);

  const convert = async () => {
    if (!src.trim()) { setErr('Please enter some code to convert.'); return; }
    setLoading(true); setErr(''); setOut('');
    try {
      const res = await callAnthropic(`Convert the following ${srcLang} code to ${tgtLang}. Return only the converted code, no explanation, no markdown fences.\n\n${src}`);
      setOut(res);
    } catch (e) { setErr(e.message || 'Conversion failed. Please try again.'); }
    finally { setLoading(false); }
  };

  const copy = () => {
    if (!out) return;
    navigator.clipboard.writeText(out);
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{ maxWidth:'960px', margin:'0 auto', padding:'48px 24px 64px' }}>
      <div style={{ textAlign:'center', marginBottom:'40px' }}>
        <h1 style={{ fontSize:'38px', fontWeight:700, letterSpacing:'-1.5px', margin:'0 0 10px', lineHeight:1.1 }}>Convert code between<br/>any language, instantly.</h1>
        <p style={{ fontSize:'15px', color:'#666' }}>Paste your code, pick a target language, and get clean results in seconds.</p>
      </div>

      <div style={{ background:'#fff', border:'1px solid #e5e5e5', borderRadius:'14px', overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
        <div style={{ padding:'12px 20px', borderBottom:'1px solid #e5e5e5', display:'flex', alignItems:'center', gap:'10px', background:'#fafafa' }}>
          <LangDrop value={srcLang} onChange={setSrcLang}/>
          <ArrowRight size={14}/>
          <LangDrop value={tgtLang} onChange={setTgtLang}/>
          <div style={{ marginLeft:'auto', display:'flex', gap:'8px' }}>
            <button onClick={copy} disabled={!out} style={{ display:'flex', alignItems:'center', gap:'5px', padding:'6px 12px', borderRadius:'6px', border:'1px solid #e5e5e5', background:'#fff', fontSize:'12px', color: out?'#444':'#bbb', cursor: out?'pointer':'default', fontWeight:500 }}>
              {copied ? <><CheckIcon size={12} color="#22c55e"/> Copied</> : <><CopyIcon size={12}/> Copy</>}
            </button>
            <button onClick={convert} disabled={loading} style={{ display:'flex', alignItems:'center', gap:'6px', padding:'6px 16px', borderRadius:'6px', background: loading?'#555':'#111', color:'#fff', fontSize:'12px', fontWeight:600, border:'none', cursor: loading?'not-allowed':'pointer' }}>
              {loading ? <><Loader size={13} style={{ animation:'spin 1s linear infinite' }}/> Converting…</> : <><ZapIcon size={13} color="#fff" fill="#fff"/> Convert</>}
            </button>
          </div>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr' }}>
          <div style={{ borderRight:'1px solid #e5e5e5' }}>
            <div style={{ padding:'7px 16px', borderBottom:'1px solid #f0f0f0' }}>
              <span style={{ fontSize:'11px', fontWeight:600, color:'#aaa', letterSpacing:'0.5px', textTransform:'uppercase' }}>{srcLang}</span>
            </div>
            <textarea value={src} onChange={e => setSrc(e.target.value)}
              style={{ width:'100%', height:'360px', padding:'16px', fontFamily:'"Fira Code",monospace', fontSize:'13px', lineHeight:'1.65', color:'#1a1a1a', background:'#fff', border:'none', outline:'none', resize:'none' }}
              placeholder="Paste your source code here…" spellCheck={false}/>
          </div>
          <div style={{ position:'relative' }}>
            <div style={{ padding:'7px 16px', borderBottom:'1px solid #f0f0f0' }}>
              <span style={{ fontSize:'11px', fontWeight:600, color:'#aaa', letterSpacing:'0.5px', textTransform:'uppercase' }}>{tgtLang}</span>
            </div>
            <textarea value={out} readOnly
              style={{ width:'100%', height:'360px', padding:'16px', fontFamily:'"Fira Code",monospace', fontSize:'13px', lineHeight:'1.65', color:'#1a1a1a', background:'transparent', border:'none', outline:'none', resize:'none' }}
              placeholder="Converted code will appear here…" spellCheck={false}/>
            {loading && (
              <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'10px', background:'rgba(250,250,250,0.85)' }}>
                <Loader size={22} style={{ animation:'spin 1s linear infinite' }}/>
                <span style={{ fontSize:'12px', color:'#999' }}>Converting…</span>
              </div>
            )}
          </div>
        </div>
        {err && <div style={{ padding:'10px 20px', borderTop:'1px solid #fee2e2', background:'#fff5f5', fontSize:'12px', color:'#dc2626' }}>{err}</div>}
      </div>

      {!subscribed && (
        <div style={{ marginTop:'16px', display:'flex', justifyContent:'center' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px', background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'8px', padding:'8px 16px', fontSize:'12px', color:'#92400e' }}>
            <SparkIcon size={13}/> Free trial active · {fmtMs(trialMs)} remaining ·
            <span style={{ fontWeight:600, cursor:'pointer', textDecoration:'underline', marginLeft:'4px' }} onClick={() => setPage('pricing')}>Upgrade now</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PRICING ───────────────────────────────────────────────────────────────────
function PricingPage({ setPage, user }) {
  return (
    <div style={{ maxWidth:'860px', margin:'0 auto', padding:'64px 24px' }}>
      <div style={{ textAlign:'center', marginBottom:'48px' }}>
        <h2 style={{ fontSize:'34px', fontWeight:700, letterSpacing:'-1px', margin:'0 0 10px' }}>Simple, honest pricing</h2>
        <p style={{ fontSize:'15px', color:'#666' }}>Start free for 7 days. No credit card required.</p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'16px', alignItems:'start' }}>
        {PLANS.map(plan => (
          <div key={plan.id} style={{ background:'#fff', border: plan.highlight?'2px solid #111':'1px solid #e5e5e5', borderRadius:'12px', padding:'28px 24px', position:'relative', boxShadow: plan.highlight?'0 4px 20px rgba(0,0,0,0.08)':'none' }}>
            {plan.highlight && (
              <div style={{ position:'absolute', top:'-12px', left:'50%', transform:'translateX(-50%)', background:'#111', color:'#fff', fontSize:'11px', fontWeight:600, padding:'3px 12px', borderRadius:'999px', whiteSpace:'nowrap' }}>MOST POPULAR</div>
            )}
            <p style={{ fontSize:'13px', fontWeight:600, color:'#888', textTransform:'uppercase', letterSpacing:'0.5px', margin:'0 0 8px' }}>{plan.label}</p>
            <div style={{ display:'flex', alignItems:'baseline', gap:'2px', marginBottom:'4px' }}>
              <span style={{ fontSize:'36px', fontWeight:700, letterSpacing:'-1px' }}>{plan.price}</span>
              <span style={{ fontSize:'13px', color:'#999' }}>{plan.period}</span>
            </div>
            <div style={{ height:'1px', background:'#f0f0f0', margin:'20px 0' }}/>
            <ul style={{ listStyle:'none', margin:'0 0 24px', padding:0, display:'flex', flexDirection:'column', gap:'10px' }}>
              {plan.perks.map(p => (
                <li key={p} style={{ display:'flex', alignItems:'flex-start', gap:'8px', fontSize:'13px', color:'#444' }}>
                  <CheckIcon size={14}/>{p}
                </li>
              ))}
            </ul>
            <a href={plan.link} target="_blank" rel="noopener noreferrer"
              style={{ display:'flex', alignItems:'center', justifyContent:'center', width:'100%', padding:'10px', borderRadius:'7px', background: plan.highlight?'#111':'#fff', color: plan.highlight?'#fff':'#111', border: plan.highlight?'none':'1px solid #d0d0d0', fontSize:'13px', fontWeight:600, textDecoration:'none' }}>
              Get started
            </a>
          </div>
        ))}
      </div>
      <div style={{ marginTop:'32px', background:'#fff', border:'1px solid #e5e5e5', borderRadius:'10px', padding:'18px 24px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <p style={{ margin:'0 0 2px', fontWeight:600, fontSize:'14px' }}>🎁 Free 7-day trial</p>
          <p style={{ margin:0, fontSize:'13px', color:'#888' }}>Try all features free — no credit card needed.</p>
        </div>
        <button onClick={() => setPage('app')} style={{ padding:'8px 18px', background:'#f5f5f5', border:'1px solid #e5e5e5', borderRadius:'7px', fontSize:'13px', fontWeight:500, cursor:'pointer', whiteSpace:'nowrap' }}>
          Continue trial →
        </button>
      </div>
      <p style={{ textAlign:'center', fontSize:'12px', color:'#aaa', marginTop:'16px' }}>
        Signed in as {user?.email || 'unknown'}
      </p>
    </div>
  );
}

// ── LANG DROPDOWN ─────────────────────────────────────────────────────────────
function LangDrop({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const ref = useRef(null);
  const filtered = languages.filter(l => l.toLowerCase().includes(search.toLowerCase()));

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setSearch(''); } };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(!open)} style={{ display:'flex', alignItems:'center', gap:'5px', padding:'5px 10px', borderRadius:'6px', border:'1px solid #e5e5e5', background:'#fff', fontSize:'13px', fontWeight:500, color:'#222', cursor:'pointer' }}>
        {value}<ChevDown size={13} style={{ transform: open?'rotate(180deg)':'none', transition:'transform 0.15s' }}/>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, width:'180px', background:'#fff', border:'1px solid #e5e5e5', borderRadius:'8px', boxShadow:'0 4px 16px rgba(0,0,0,0.08)', zIndex:100, overflow:'hidden' }}>
          <div style={{ padding:'8px' }}>
            <input autoFocus value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…"
              style={{ width:'100%', padding:'6px 10px', border:'1px solid #e5e5e5', borderRadius:'5px', fontSize:'12px', outline:'none', color:'#333' }}/>
          </div>
          <div style={{ maxHeight:'200px', overflowY:'auto' }}>
            {filtered.length ? filtered.map(l => (
              <button key={l} onClick={() => { onChange(l); setOpen(false); setSearch(''); }}
                style={{ width:'100%', textAlign:'left', padding:'7px 14px', fontSize:'13px', background: l===value?'#f5f5f5':'transparent', color: l===value?'#111':'#444', fontWeight: l===value?600:400, border:'none', cursor:'pointer' }}>
                {l}
              </button>
            )) : <div style={{ padding:'10px 14px', fontSize:'12px', color:'#aaa' }}>No results</div>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
